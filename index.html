<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Próximamente | Pablo Bordería</title>
  
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🖤</text></svg>">

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400&display=swap" rel="stylesheet">

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            display: ['Playfair Display', 'serif'],
            body: ['Inter', 'sans-serif'],
          },
        },
      },
    }
  </script>

  <style>
    body {
      background-color: #000;
      color: #fff;
      font-family: 'Inter', sans-serif;
      overflow: hidden;
    }

    /* Textura de ruido sutil igual que tu web original */
    .noise::after {
      content: '';
      position: fixed;
      inset: 0;
      z-index: 10;
      pointer-events: none;
      opacity: 0.03;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
    }

    .gold-accent {
      background: linear-gradient(90deg, transparent, #c9a84c, transparent);
    }

    .gradient-text {
      background: linear-gradient(135deg, #fff 0%, #a0a0a0 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    /* Animación de entrada suave */
    .fade-in {
      animation: fadeIn 2s ease-out forwards;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>

<body class="noise flex items-center justify-center min-h-screen">

  <div class="relative z-20 text-center px-6 fade-in">
    <p class="font-display text-sm tracking-[0.4em] uppercase text-white/40 mb-4">Pablo Bordería</p>
    
    <h1 class="font-display text-4xl md:text-6xl font-bold mb-6 gradient-text">
      Próximamente
    </h1>

    <div class="w-24 h-px gold-accent mx-auto mb-8"></div>

    <p class="text-white/50 max-w-md mx-auto text-lg leading-relaxed font-light">
      Estamos ajustando los últimos detalles. <br>
      Esta web todavía no se puede visitar públicamente.
    </p>

    <div class="mt-12 text-white/20 text-xs tracking-widest uppercase">
      Metodología en proceso
    </div>
  </div>

</body>
</html>
